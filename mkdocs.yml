site_name: Manual de Soporte — Circles Learning

nav:
  - Inicio: index.md
  - Herramientas: herramientas.md
  - Correo de soporte: correo-soporte.md
  - Responsabilidades: responsabilidades.md
  - Priorización: priorizacion.md
  - Admin Circles: admin-circles.md
  - Help Desk: help-desk.md
  - Registro de datos: registro-datos.md
  - Problemas y FAQ: problemas-y-faq.md
  - Plantillas: plantillas.md
  - Ejemplos de respuesta: ejemplos-respuesta.md
  - Para coordinadores: coordinadores.md
  - Tiempos de respuesta (SLAs): slas.md
  - Escalamiento: escalamiento.md
  - Onboarding: onboarding.md

theme:
  name: material
  language: es
  logo: img/logo-circles.png
  favicon: img/favicon-circles.png
  font:
    text: Montserrat
    code: Roboto Mono
  palette:
    primary: custom
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
